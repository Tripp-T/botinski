name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: forgejo.trippt.xyz
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: https://github.com/nix-community/cache-nix-action@v5
        with:
          primary-key: nix-check-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-keys: |
            nix-check-${{ runner.os }}-

      - name: nix flake check (fmt + clippy + test + sqlx-prepare)
        run: nix flake check

  build-and-push:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: https://github.com/nix-community/cache-nix-action@v5
        with:
          primary-key: nix-build-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-keys: |
            nix-build-${{ runner.os }}-

      - name: Build Docker image via Nix Flake
        run: nix build .#docker

      - name: Load image into Docker
        run: docker load -i result

      - name: Log in to Forgejo Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Tag and push Docker image
        run: |
          TARGET_IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[A-Z]' '[a-z]')
          SOURCE_IMAGE="botinski:latest"

          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE:latest"
          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE:${{ github.sha }}"

          echo "Pushing $TARGET_IMAGE:latest and $TARGET_IMAGE:${{ github.sha }}"
          docker push "$TARGET_IMAGE:latest"
          docker push "$TARGET_IMAGE:${{ github.sha }}"
