name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: forgejo.trippt.xyz
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Compile sqlx queries against the committed .sqlx/ cache by default;
      # the prepare-check step sets its own DATABASE_URL.
      SQLX_OFFLINE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: https://github.com/nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: cargo fmt
        run: nix develop --command cargo fmt --all -- --check

      - name: cargo clippy
        run: nix develop --command cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: nix develop --command cargo test --all-targets

      - name: Verify .sqlx is in sync with the queries
        run: |
          export DATABASE_URL="sqlite:///tmp/sqlx-check.db?mode=rwc"
          nix develop --command bash -c "
            sqlx database create &&
            sqlx migrate run &&
            cargo sqlx prepare --check -- --all-targets --all-features
          "

  build-and-push:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: https://github.com/nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Build Docker image via Nix Flake
        run: nix build .#docker

      - name: Load image into Docker
        run: docker load -i result

      - name: Log in to Forgejo Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Tag and push Docker image
        run: |
          TARGET_IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[A-Z]' '[a-z]')
          SOURCE_IMAGE="botinski:latest"

          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE:latest"
          docker tag "$SOURCE_IMAGE" "$TARGET_IMAGE:${{ github.sha }}"

          echo "Pushing $TARGET_IMAGE:latest and $TARGET_IMAGE:${{ github.sha }}"
          docker push "$TARGET_IMAGE:latest"
          docker push "$TARGET_IMAGE:${{ github.sha }}"
