name: Check

on:
  pull_request:
  push:
    branches-ignore:
      - main  # main is gated by build-push.yml's `check` job

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Compile sqlx queries against the committed .sqlx/ cache by default;
      # the prepare-check step below sets its own DATABASE_URL.
      SQLX_OFFLINE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: https://github.com/nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: cargo fmt
        run: nix develop --command cargo fmt --all -- --check

      - name: cargo clippy
        run: nix develop --command cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: nix develop --command cargo test --all-targets

      - name: Verify .sqlx is in sync with the queries
        run: |
          export DATABASE_URL="sqlite:///tmp/sqlx-check.db?mode=rwc"
          nix develop --command bash -c "
            sqlx database create &&
            sqlx migrate run &&
            cargo sqlx prepare --check -- --all-targets --all-features
          "
